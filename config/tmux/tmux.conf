#### ─────────────────────────────────────────────────────────────
####  Key Bindings — Quick Reference
#### ─────────────────────────────────────────────────────────────
####  Prefix:  `  (backtick)  ·  send literal `:  ` `
####
####  ── No prefix ──
####    Alt + ←↓↑→        navigate panes (vim-aware)
####    Shift + ← / →     swap window left / right
####
####  ── Prefix + key ──
####    R                 reload config
####    r                 rename current window
####    n                 toggle window-name visibility
####    x                 kill pane (no confirm)
####    D                 detach client
####    S                 sesh session menu
####    g                 lazygit popup
####    d                 lazydocker popup
####    t                 floax popup shell
####    T                 floax menu
####    I / U             TPM: install / update plugins
####    :sync             toggle synchronize-panes
#### ─────────────────────────────────────────────────────────────

#### ─────────────────────────────────────────────────────────────
####  General
#### ─────────────────────────────────────────────────────────────
set -g default-command /bin/zsh
set -g history-limit 50000
set -g mouse on
set -s escape-time 0
set -g detach-on-destroy off            # don't exit tmux when closing a session
set -g allow-passthrough on
set -g set-clipboard on
set-option -g focus-events on           # required for auto-reload in editors

#### Window & pane indexing
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on       # auto-renumber when closing a window

#### Window & pane behavior
set-window-option -g monitor-activity off
set-option -g visual-activity off
set -g allow-rename off
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

#### ─────────────────────────────────────────────────────────────
####  Terminal & Colors
#### ─────────────────────────────────────────────────────────────
set -g default-terminal 'xterm-ghostty'
set-option -a terminal-features 'xterm-ghostty:RGB'                                                                # TrueColor
set -gas terminal-overrides ',xterm-ghostty:Ms=\E]52;%p1%s;%p2%s\007'                                              # OSC52 clipboard
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'                                                                 # undercurl
set -as terminal-overrides ',*:Setulc=\E[58::2::::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'        # undercurl colors
set -as terminal-overrides ',*:smcup@:rmcup@'                                                                      # fix mouse scroll in some terminals

set -g window-style 'bg=default'
set -g window-active-style 'bg=default'

#### ─────────────────────────────────────────────────────────────
####  Prefix
#### ─────────────────────────────────────────────────────────────
unbind C-b
set -g prefix `                         # backtick prefix for easier access
bind ` send-prefix                      # double-tap to send literal `

#### ─────────────────────────────────────────────────────────────
####  Remote (SSH) Detection
#### ─────────────────────────────────────────────────────────────
if-shell '[ -n "$SSH_CONNECTION" ]' \
  'set -g @host_type remote' \
  'set -g @host_type local'

#### ─────────────────────────────────────────────────────────────
####  Key Bindings
#### ─────────────────────────────────────────────────────────────

#### Config reload
bind-key R source-file ~/.tmux.conf \; display-message "Config reloaded"

#### Pane navigation — vim-aware
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n M-Left  if-shell "$is_vim" 'send-keys M-Left'  'select-pane -L'
bind-key -n M-Down  if-shell "$is_vim" 'send-keys M-Down'  'select-pane -D'
bind-key -n M-Up    if-shell "$is_vim" 'send-keys M-Up'    'select-pane -U'
bind-key -n M-Right if-shell "$is_vim" 'send-keys M-Right' 'select-pane -R'

#### Window management
bind-key r command-prompt -I "#W" "rename-window '%%'"
bind-key -n S-Left  swap-window -t -1\; select-window -t -1
bind-key -n S-Right swap-window -t +1\; select-window -t +1

#### Sessions / detach / kill
bind-key x kill-pane                    # skip the kill-pane confirm prompt
bind D detach-client                    # default `d` is taken below by lazydocker

# sesh menu
bind-key "S" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

#### Popups
bind g if-shell "command -v lazygit >/dev/null 2>&1" \
  "display-popup -E -x C -y C -w 88% -h 76% -T ' lazygit ' -d '#{pane_current_path}' 'lazygit'" \
  "display-message 'lazygit not found in PATH'"

bind d if-shell "command -v lazydocker >/dev/null 2>&1" \
  "display-popup -E -x C -y C -w 88% -h 76% -T ' lazydocker ' -d '#{pane_current_path}' 'lazydocker'" \
  "display-message 'lazydocker not found in PATH'"

#### Sync panes — type `:sync` to toggle
set -as command-alias "sync=set -w synchronize-panes\; display 'synchronize-panes: #{?pane_synchronized,on,off}'"

#### ─────────────────────────────────────────────────────────────
####  Status Bar (minimal-tmux)
#### ─────────────────────────────────────────────────────────────
set -g @minimal-tmux-bg "#7aa2f7"
set -g @minimal-tmux-fg "#1a1b26"
set -g @minimal-tmux-justify "centre"
set -g @minimal-tmux-indicator-str "  exo "
set -g @minimal-tmux-indicator true
set -g @minimal-tmux-status "bottom"

# left/right status enabled
set -g @minimal-tmux-left true
set -g @minimal-tmux-right true
set -g @minimal-tmux-status-left ""
set -g @minimal-tmux-status-right "#S"
set -g @minimal-tmux-status-left-extra ""
set -g @minimal-tmux-status-right-extra ""

# fullscreen / expanded icon
set -g @minimal-tmux-expanded-icon "󰊓 "
set -g @minimal-tmux-show-expanded-icons-for-all-tabs true

# selection box style (true = edged)
set -g @minimal-tmux-use-arrow true
set -g @minimal-tmux-right-arrow ""
set -g @minimal-tmux-left-arrow ""

# avoid truncation of left/right status strings
set -g status-right-length 20
set -g status-left-length 20

# remote override: green bar + shk indicator
if-shell '[ -n "$SSH_CONNECTION" ]' \
  'set -g @minimal-tmux-bg "#00FF00"; set -g @minimal-tmux-indicator-str " shk "'

#### ─────────────────────────────────────────────────────────────
####  Plugins
#### ─────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'niksingh710/minimal-tmux-status'

set -g @plugin 'omerxx/tmux-floax'
set -g @floax-bind 't'
set -g @floax-bind-menu 'T'
set -g @floax-width '88%'
set -g @floax-height '76%'
set -g @floax-border-color '#ff6f00'
set -g @floax-text-color '#c8d1dc'
set -g @floax-session-name 'popup-shell'
set -g @floax-title ' floax '

#### Auto-install TPM on first run
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

#### Initialize TMUX Plugin Manager (keep at the bottom)
run '~/.tmux/plugins/tpm/tpm'

#### ─────────────────────────────────────────────────────────────
####  Window Name Visibility (post-plugin, depends on minimal.sh)
#### ─────────────────────────────────────────────────────────────
run-shell "~/.dotfiles/config/tmux/minimal.sh"
set -g @win_names 1

bind-key n if-shell '[ "$(tmux show -gv @win_names)" = "1" ]' \
  'set-option -g @win_names 0; run-shell "~/.dotfiles/config/tmux/minimal.sh"' \
  'set-option -g @win_names 1; run-shell "~/.dotfiles/config/tmux/minimal.sh"'
